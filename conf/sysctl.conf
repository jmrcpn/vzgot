#-------------------------------------------
#VZGOT sysctl.conf
#allowing forwarding routing
net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1
net.ipv4.conf.default.forwarding = 1
#to allow Bridge to answer ARP request
net.ipv4.conf.all.proxy_arp = 1
#To allow IPV6 forwarding
net.ipv6.conf.default.forwarding = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.all.proxy_ndp = 1
#to allow radvd router advertisement to be used.
net.ipv6.conf.default.accept_ra = 2
net.ipv6.conf.all.accept_ra = 2
#change inotify limits to allow many containers
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=1024
#to disable br_netfilter
net.bridge.bridge-nf-call-iptables = 0
#-------------------------------------------
#to avoid dmesg to be accessible from containers
kernel.dmesg_restrict = 1
#-------------------------------------------
